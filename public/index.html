<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mini LMS V2.0</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Outfit) -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
  <!-- Glowing Background Accents -->
  <div class="absolute w-[400px] h-[400px] rounded-full bg-blue-500/10 blur-[100px] top-[-100px] left-[-100px] -z-10"></div>
  <div class="absolute w-[450px] h-[450px] rounded-full bg-violet-500/10 blur-[100px] bottom-[-150px] right-[-150px] -z-10"></div>

  <!-- Login Card Container -->
  <div class="w-full max-w-md p-1">
    <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 rounded-3xl p-8 shadow-2xl shadow-blue-500/5 relative">
      <!-- Title & Branding -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-tr from-blue-600 to-violet-600 shadow-lg shadow-blue-500/20 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7 text-white">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.62 48.62 0 0112 20.904a48.62 48.62 0 018.231-4.41 60.46 60.46 0 00-.49-6.347m-9.582-4.977a5.009 5.009 0 00-.012 9.878m9.592-4.9a5.009 5.009 0 00-.013 9.878m-8.967-3.483L12 14l.262-.18m0 0a45.58 45.58 0 01.002-9.762L12 3.82l-.262.18a45.58 45.58 0 01.002 9.762M12 14c.261 0 .522-.06.76-.18l-.26-.182-.26.182c.238.12.5.18.76.18z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 via-indigo-300 to-violet-400 bg-clip-text text-transparent">Mini LMS V2.0</h1>
        <p class="text-slate-400 text-sm mt-1">Sistem Manajemen Pembelajaran Karyawan</p>
      </div>

      <!-- Error / Alert Message -->
      <div id="alertBox" class="hidden mb-6 p-4 rounded-xl border bg-red-500/10 border-red-500/30 text-red-400 text-sm flex items-start space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0 mt-0.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <span id="alertMessage">Username atau password salah.</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-5">
        <div>
          <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
          <div class="relative">
            <input type="text" id="username" required
              class="w-full px-4 py-3 bg-slate-950/50 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-100 placeholder-slate-600 transition"
              placeholder="Masukkan username anda...">
          </div>
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <input type="password" id="password" required
              class="w-full px-4 py-3 bg-slate-950/50 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-100 placeholder-slate-600 transition"
              placeholder="••••••••">
          </div>
        </div>

        <button type="submit" id="submitBtn"
          class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold rounded-xl hover:from-blue-500 hover:to-indigo-500 transition shadow-lg shadow-blue-500/10 focus:outline-none">
          Masuk ke Akun
        </button>
      </form>

    </div>
  </div>

  <script>
    // Check if already logged in and redirect accordingly
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('role');
      if (token && role) {
        if (role === 'admin') {
          window.location.href = '/admin.html';
        } else {
          window.location.href = '/karyawan.html';
        }
      }
    });

    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const alertMessage = document.getElementById('alertMessage');
    const submitBtn = document.getElementById('submitBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Hide alerts & disable button
      alertBox.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Username atau password salah.');
        }

        // Save session credentials
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.user.role);
        localStorage.setItem('username', data.user.username);

        // Redirect based on role
        if (data.user.role === 'admin') {
          window.location.href = '/admin.html';
        } else {
          window.location.href = '/karyawan.html';
        }
      } catch (err) {
        alertMessage.textContent = err.message;
        alertBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk ke Akun';
      }
    });
  </script>
</body>
</html>
